name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      env:
        VITE_FIREBASE_API_KEY: "AIzaSyAXwAPhX9NhCe3-Ll3zsv-rKz_A2L4P-Tg"
        VITE_FIREBASE_AUTH_DOMAIN: "mini-games-ad630.firebaseapp.com"
        VITE_FIREBASE_DATABASE_URL: "https://mini-games-ad630-default-rtdb.europe-west1.firebasedatabase.app"
        VITE_FIREBASE_PROJECT_ID: "mini-games-ad630"
        VITE_FIREBASE_STORAGE_BUCKET: "mini-games-ad630.firebasestorage.app"
        VITE_FIREBASE_MESSAGING_SENDER_ID: "311416350524"
        VITE_FIREBASE_APP_ID: "1:311416350524:web:14d64deb938b3dd64a6039"
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4